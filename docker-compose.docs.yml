services:
  docs:
    image: complete_business_analysis_tool_local_docs
    container_name: complete_business_analysis_tool_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./complete_business_analysis_tool:/app/complete_business_analysis_tool:z
    ports:
      - '9000:9000'
    command: /start-docs
